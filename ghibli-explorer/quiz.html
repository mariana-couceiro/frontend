<section class="container py-5">

    <h1 class="text-center mb-5">
        🌿 Which Studio Ghibli Movie Matches Your Personality?
    </h1>

    <div class="card p-4">

        <!-- Pergunta 1 -->

        <h4>1. Where would you rather live?</h4>

        <select id="q1" class="form-select mb-4">

            <option value="">Choose...</option>
            <option value="totoro">🌳 In a peaceful forest</option>
            <option value="spirited">✨ In a magical city</option>
            <option value="ponyo">🌊 By the sea</option>

        </select>

        <!-- Pergunta 2 -->

        <h4>2. Choose your favourite animal</h4>

        <select id="q2" class="form-select mb-4">

            <option value="">Choose...</option>
            <option value="totoro">🐱 Cat</option>
            <option value="spirited">🐉 Dragon</option>
            <option value="ponyo">🐟 Fish</option>

        </select>

        <!-- Pergunta 3 -->

        <h4>3. Which quality describes you best?</h4>

        <select id="q3" class="form-select mb-4">

            <option value="">Choose...</option>
            <option value="totoro">😊 Calm</option>
            <option value="spirited">✨ Brave</option>
            <option value="ponyo">💙 Curious</option>

        </select>

        <button class="btn btn-success" onclick="showMovie()">

            Show My Result

        </button>

        <div id="result" class="mt-4 text-center"></div>

    </div>

</section>

<script src="script.js"></script>
